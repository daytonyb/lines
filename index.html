<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw A Line</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="modeScreen">
        <h1>Draw A Line</h1>
        <div class="mode-container">
            <button class="mode-btn" id="colorModeBtn">Color Mode</button>
            <button class="mode-btn" id="shapeModeBtn">Shape Mode</button>
        </div>
    </div>

    <div id="menuScreen" style="display: none;">
        <button class="menu-btn" id="backToModesBtn">← Change Mode</button>
        <h1>Select a Level</h1>
        <div id="stagesContainer"></div>
    </div>

    <div id="gameScreen" style="display: none;">
        <button class="menu-btn" id="backBtn">← Give Up</button>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div id="completionScreen" style="display: none;">
        <h1>Puzzle Solved!</h1>
        <button class="menu-btn" id="nextLevelBtn">Next Level</button>
        <button class="menu-btn" id="completionMenuBtn">Back to Menu</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
