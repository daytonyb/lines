<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw A Line - Level Editor</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1e1e1e;
            color: white;
            font-family: sans-serif;
            display: flex;
            gap: 30px;
            height: 90vh;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            border-bottom: 2px solid #444;
            padding-bottom: 8px;
            font-size: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
        }

        input[type="number"], select {
            background-color: #444;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover { background-color: #0098ff; }
        button.secondary { background-color: #444; border: 1px solid #555; }
        button.secondary:hover { background-color: #555; }

        /* Palette Styling */
        .palette {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .palette-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background-color: #383838;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
        }

        .palette-item:hover { background-color: #444; }
        .palette-item.active { border-color: #007acc; background-color: #484848; }

        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Workspace Grid Styling */
        #workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            border-radius: 8px;
            border: 2px dashed #333;
            overflow: auto;
            padding: 20px;
        }

        #gridContainer {
            display: grid;
            background-color: #222;
            user-select: none;
            transition: all 0.3s ease;
        }

        .grid-cell {
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.05s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-cell:hover {
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0 0 6px rgba(255,255,255,0.4);
        }

        textarea {
            width: 100%;
            height: 140px;
            background-color: #1a1a1a;
            color: #32cd32;
            border: 1px solid #444;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            resize: vertical;
            box-sizing: border-box;
            border-radius: 4px;
        }
        
        #layerControl { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Level Editor</h2>

        <div class="control-group">
            <label>Target Game Mode</label>
            <select id="modeSelector">
                <option value="color">Color Mode</option>
                <option value="shape">Shape Mode</option>
            </select>
        </div>

        <div class="control-group" id="layerControl">
            <label style="color: #00ffff;">Shape Editing Layer</label>
            <select id="layerSelector">
                <option value="grid">Line Intersections & Terminals</option>
                <option value="cells">Cell Shapes (Black/White Squares)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label id="gridSizeLabel">Grid Bounds (Columns x Rows)</label>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="inputCols" value="5" min="1" max="20" style="width: 50%;">
                <input type="number" id="inputRows" value="4" min="1" max="20" style="width: 50%;">
            </div>
            <button id="resizeBtn">Apply Grid Size</button>
        </div>

        <div class="control-group">
            <label>Select Element to Paint</label>
            <div class="palette" id="paletteContainer"></div>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; width: 100%;">

        <div class="control-group">
            <label>Level Code Output</label>
            <textarea id="outputData" placeholder="Generated code will appear here..."></textarea>
            <button id="copyBtn">Copy to Clipboard</button>
            <button id="importBtn" class="secondary">Import Map Data</button>
        </div>
        
        <button id="clearBtn" class="secondary" style="margin-top: auto; border-color: #cc2424; color: #ff6b6b;">Clear Active Layer</button>
    </div>

    <div id="workspace">
        <div id="gridContainer"></div>
    </div>

    <script>
        // --- DATA & PALETTES ---
        const palettes = {
            color: {
                '-1': { hex: '#1e1e1e', name: 'Void (-1)', render: '' },
                0: { hex: '#444444', name: 'Grey (0)', render: '' },
                1: { hex: '#ff4444', name: 'Red (1)', render: '' },
                2: { hex: '#4444ff', name: 'Blue (2)', render: '' },
                3: { hex: '#ffcc00', name: 'Yellow (3)', render: '' },
                4: { hex: '#32cd32', name: 'Start/End (4)', render: '' },
                5: { hex: '#ff8800', name: 'Toggle (5)', render: '' },
                6: { hex: '#00ffff', name: 'Straight (6)', render: '' },
                7: { hex: '#9932cc', name: 'Overpass (7)', render: '' }
            },
            shape_grid: {
                '-1': { hex: '#1e1e1e', name: 'No Path (-1)', render: `<div style="width: 14px; height: 14px; border: 1px dashed #666; border-radius: 50%;"></div>` },
                0: { hex: '#444446', name: 'Node / Path (0)', render: `<div style="width: 16px; height: 16px; background-color: #444446; border-radius: 50%;"></div>` },
                4: { hex: '#32cd32', name: 'Terminal (4)', render: `<div style="width: 28px; height: 28px; background-color: #32cd32; border-radius: 50%; border: 3px solid #111;"></div>` }
            },
            shape_cells: {
                0: { hex: '#282828', name: 'Empty (0)', render: '' },
                1: { hex: '#000000', name: 'Black Square (1)', render: `<div style="width: 24px; height: 24px; background-color: #000; border: 2px solid #555;"></div>` },
                2: { hex: '#ffffff', name: 'White Square (2)', render: `<div style="width: 24px; height: 24px; background-color: #fff;"></div>` },
                3: { hex: '#ffcc00', name: 'Star Rule (3)', render: `<div style="width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 24px solid #ffcc00;"></div>` }
            }
        };

        // --- EDITOR STATE ---
        let rows = 4;
        let cols = 5;
        let selectedType = 4;
        let isDrawing = false;
        
        let colorGridData = [];
        let shapeGridData = [];
        let shapeCellsData = []; // The layer for the squares!

        // UI Selectors
        const modeSelector = document.getElementById('modeSelector');
        const layerSelector = document.getElementById('layerSelector');
        const layerControl = document.getElementById('layerControl');
        const paletteContainer = document.getElementById('paletteContainer');
        const gridContainer = document.getElementById('gridContainer');
        const outputData = document.getElementById('outputData');
        const inputRows = document.getElementById('inputRows');
        const inputCols = document.getElementById('inputCols');

        // --- INITIALIZATION ---
        function initArrays() {
            colorGridData = Array(rows).fill(null).map(() => Array(cols).fill(0));
            shapeGridData = Array(rows).fill(null).map(() => Array(cols).fill(0));
            // Cells matrix is always 1 row/col smaller than the intersections grid
            shapeCellsData = Array(Math.max(1, rows-1)).fill(null).map(() => Array(Math.max(1, cols-1)).fill(0));
        }

        function getActivePalette() {
            if (modeSelector.value === 'color') return palettes.color;
            return layerSelector.value === 'grid' ? palettes.shape_grid : palettes.shape_cells;
        }

        function getActiveGridReference() {
            if (modeSelector.value === 'color') return colorGridData;
            return layerSelector.value === 'grid' ? shapeGridData : shapeCellsData;
        }

        function buildPalette() {
            const activePalette = getActivePalette();
            let html = '';
            
            // Auto-select a valid tool when switching palettes
            if (!activePalette[selectedType]) {
                selectedType = parseInt(Object.keys(activePalette)[0]);
            }

            Object.keys(activePalette).forEach(key => {
                const typeId = parseInt(key);
                const activeClass = typeId === selectedType ? 'active' : '';
                const baseStyle = `background-color: ${activePalette[key].hex}; ${typeId === -1 ? 'border: 1px dashed #555;' : ''}`;
                
                const innerRender = modeSelector.value === 'shape' ? activePalette[key].render : '';
                const swatchStyle = modeSelector.value === 'shape' ? `background-color: transparent; border: 1px solid #444;` : baseStyle;

                html += `
                    <div class="palette-item ${activeClass}" data-type="${typeId}">
                        <div class="color-swatch" style="${swatchStyle}">
                            ${innerRender}
                        </div>
                        <span style="font-size: 12px;">${activePalette[key].name}</span>
                    </div>
                `;
            });
            paletteContainer.innerHTML = html;

            document.querySelectorAll('.palette-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    document.querySelectorAll('.palette-item').forEach(p => p.classList.remove('active'));
                    item.classList.add('active');
                    selectedType = parseInt(item.getAttribute('data-type'));
                });
            });
        }

        function drawWorkspace() {
            const activeGrid = getActiveGridReference();
            const currentRows = activeGrid.length;
            const currentCols = activeGrid[0].length;

            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${currentCols}, 50px)`;
            gridContainer.style.gridTemplateRows = `repeat(${currentRows}, 50px)`;

            // Dynamically transform the wrapper layout based on current mode/layer
            if (modeSelector.value === 'color') {
                gridContainer.style.gap = '2px';
                gridContainer.style.backgroundColor = '#222';
                gridContainer.style.padding = '4px';
                gridContainer.style.backgroundImage = 'none';
            } 
            else if (modeSelector.value === 'shape' && layerSelector.value === 'grid') {
                // Intersections Layer: Setup CSS Wireframe mapping
                gridContainer.style.gap = '0px';
                gridContainer.style.backgroundColor = 'transparent';
                gridContainer.style.padding = '25px';
                gridContainer.style.backgroundImage = `
                    linear-gradient(#333 6px, transparent 6px),
                    linear-gradient(90deg, #333 6px, transparent 6px)
                `;
                gridContainer.style.backgroundSize = '50px 50px';
                gridContainer.style.backgroundPosition = '47px 47px'; 
            } 
            else if (modeSelector.value === 'shape' && layerSelector.value === 'cells') {
                // Cells Layer: Create floating panels
                gridContainer.style.gap = '10px';
                gridContainer.style.backgroundColor = '#121212';
                gridContainer.style.padding = '20px';
                gridContainer.style.backgroundImage = 'none';
            }

            for (let r = 0; r < currentRows; r++) {
                for (let c = 0; c < currentCols; c++) {
                    const cellValue = activeGrid[r][c];
                    const cell = document.createElement('div');
                    cell.classList.add('grid-cell');
                    
                    cell.setAttribute('data-row', r);
                    cell.setAttribute('data-col', c);

                    renderCellVisuals(cell, cellValue);

                    cell.addEventListener('mousedown', () => { isDrawing = true; paintCell(cell); });
                    cell.addEventListener('mouseenter', () => { if (isDrawing) paintCell(cell); });

                    gridContainer.appendChild(cell);
                }
            }
            updateExportCode();
        }

        // Applies targeted styling to a single cell
        function renderCellVisuals(cell, cellValue) {
            const activePalette = getActivePalette();
            cell.innerHTML = activePalette[cellValue].render || '';

            if (modeSelector.value === 'color') {
                cell.style.backgroundColor = activePalette[cellValue] ? activePalette[cellValue].hex : '#222';
                cell.style.border = cellValue === -1 ? '1px dashed #333' : '1px solid rgba(0,0,0,0.15)';
                cell.style.borderRadius = '0px';
            } 
            else if (modeSelector.value === 'shape') {
                if (layerSelector.value === 'grid') {
                    cell.style.backgroundColor = 'transparent';
                    cell.style.border = 'none';
                } 
                else if (layerSelector.value === 'cells') {
                    cell.style.backgroundColor = '#282828';
                    cell.style.border = '1px solid #444';
                    cell.style.borderRadius = '6px';
                }
            }
        }

        function paintCell(cellElement) {
            const r = parseInt(cellElement.getAttribute('data-row'));
            const c = parseInt(cellElement.getAttribute('data-col'));
            const activeGrid = getActiveGridReference();
            
            activeGrid[r][c] = selectedType;
            renderCellVisuals(cellElement, selectedType);
            updateExportCode();
        }

        function updateExportCode() {
            if (modeSelector.value === 'color') {
                let lines = colorGridData.map(row => `    [${row.join(', ')}]`);
                outputData.value = `[\n${lines.join(',\n')}\n]`;
            } else {
                // Compile the dual-layer Object for Shape Mode!
                let gridLines = shapeGridData.map(row => `        [${row.join(', ')}]`);
                let cellLines = shapeCellsData.map(row => `        [${row.join(', ')}]`);
                outputData.value = `{\n    grid: [\n${gridLines.join(',\n')}\n    ],\n    cells: [\n${cellLines.join(',\n')}\n    ]\n}`;
            }
        }

        // --- LISTENERS ---
        window.addEventListener('mouseup', () => { isDrawing = false; });

        modeSelector.addEventListener('change', () => {
            layerControl.style.display = modeSelector.value === 'shape' ? 'flex' : 'none';
            buildPalette();
            drawWorkspace();
        });

        layerSelector.addEventListener('change', () => {
            buildPalette();
            drawWorkspace();
        });

        document.getElementById('resizeBtn').addEventListener('click', () => {
            let newRows = parseInt(inputRows.value) || 4;
            let newCols = parseInt(inputCols.value) || 5;
            
            const resizeArray = (oldArr, rLimit, cLimit, defaultVal) => {
                return Array(rLimit).fill(null).map((_, r) => 
                    Array(cLimit).fill(null).map((_, c) => 
                        (oldArr[r] && oldArr[r][c] !== undefined) ? oldArr[r][c] : defaultVal
                    )
                );
            };

            rows = newRows;
            cols = newCols;
            colorGridData = resizeArray(colorGridData, rows, cols, 0);
            shapeGridData = resizeArray(shapeGridData, rows, cols, 0);
            shapeCellsData = resizeArray(shapeCellsData, Math.max(1, rows-1), Math.max(1, cols-1), 0);
            
            drawWorkspace();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if(confirm("Clear the currently active viewing layer?")) {
                const activeGrid = getActiveGridReference();
                for (let r = 0; r < activeGrid.length; r++) {
                    for (let c = 0; c < activeGrid[0].length; c++) {
                        activeGrid[r][c] = 0;
                    }
                }
                drawWorkspace();
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            outputData.select();
            document.execCommand('copy');
            alert('Level Code Copied!');
        });

        document.getElementById('importBtn').addEventListener('click', () => {
            const code = outputData.value.trim();
            if (!code) return alert("Please paste code first.");
            
            try {
                // Safely evaluate incoming code string to JS Object
                const parsed = eval(`(${code})`); 
                
                if (Array.isArray(parsed)) {
                    // It's a Color Map (single 2D array)
                    modeSelector.value = 'color';
                    layerControl.style.display = 'none';
                    rows = parsed.length;
                    cols = parsed[0].length;
                    colorGridData = parsed;
                    // Safely reconstruct backing arrays for shape just in case they switch back
                    shapeGridData = Array(rows).fill(null).map(() => Array(cols).fill(0));
                    shapeCellsData = Array(Math.max(1, rows-1)).fill(null).map(() => Array(Math.max(1, cols-1)).fill(0));
                } else if (parsed && parsed.grid && parsed.cells) {
                    // It's a Shape Map (Object with {grid, cells})
                    modeSelector.value = 'shape';
                    layerControl.style.display = 'flex';
                    rows = parsed.grid.length;
                    cols = parsed.grid[0].length;
                    shapeGridData = parsed.grid;
                    shapeCellsData = parsed.cells;
                    // Safely reconstruct backing array for color
                    colorGridData = Array(rows).fill(null).map(() => Array(cols).fill(0));
                } else {
                    throw new Error("Format not recognized.");
                }

                inputRows.value = rows;
                inputCols.value = cols;
                buildPalette();
                drawWorkspace();

            } catch (err) {
                alert("Import failed. Ensure code matches standard matrix or object outputs: " + err.message);
            }
        });

        // Initialize editor
        initArrays();
        buildPalette();
        drawWorkspace();
    </script>
</body>
</html>
